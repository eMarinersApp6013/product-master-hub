server {
    listen 80;
    server_name whatsapp.nodesurge.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name whatsapp.nodesurge.tech;

    ssl_certificate     /etc/letsencrypt/live/whatsapp.nodesurge.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whatsapp.nodesurge.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Socket.io support
    location /socket.io/ {
        proxy_pass         http://localhost:4100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # API, webhook, health routes → wa-chat Express server
    location ~ ^/(api|webhook|health) {
        proxy_pass         http://localhost:4100;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static React admin panel
    root /var/www/wa-chat/admin-panel/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
