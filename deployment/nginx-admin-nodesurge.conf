server {
    listen 80;
    server_name admin.nodesurge.tech;

    # Redirect to HTTPS (certbot will manage this)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name admin.nodesurge.tech;

    # SSL (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/admin.nodesurge.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.nodesurge.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ProductVault Next.js app (port 4006)
    location / {
        proxy_pass         http://localhost:4006;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
